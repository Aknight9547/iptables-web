<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iptables Web管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/datatables@1.11.3/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; }
        .main-content { min-height: 100vh; }
        .table th { white-space: nowrap; }
        .btn-group-xs > .btn { padding: 2px 8px; font-size: 12px; }
        .modal-body { max-height: 60vh; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
                <div class="position-sticky pt-3">
                    <h5 class="sidebar-heading d-flex justify-content-between align-items-center px-3 mt-4 mb-1 text-muted">
                        <span>iptables管理</span>
                    </h5>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active" href="#" onclick="showPage('dashboard')">
                                <i class="fa fa-dashboard"></i> 仪表盘
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="showPage('rules')">
                                <i class="fa fa-list"></i> 规则管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="showPage('history')">
                                <i class="fa fa-history"></i> 历史记录
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="showPage('templates')">
                                <i class="fa fa-templates"></i> 规则模板
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="showPage('import_export')">
                                <i class="fa fa-upload"></i> 导入导出
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="showPage('system')">
                                <i class="fa fa-server"></i> 系统状态
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>
            
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2" id="page-title">仪表盘</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button class="btn btn-outline-secondary" onclick="refreshRules()">
                            <i class="fa fa-refresh"></i> 刷新
                        </button>
                    </div>
                </div>
                
                <div id="dashboard-page">
                    <div class="row">
                        <div class="col-md-3">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="card-title">规则总数</h5>
                                    <p class="card-text display-4" id="total-rules">0</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="card-title">Filter表</h5>
                                    <p class="card-text display-4" id="filter-rules">0</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="card-title">NAT表</h5>
                                    <p class="card-text display-4" id="nat-rules">0</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="card-title">Mangle表</h5>
                                    <p class="card-text display-4" id="mangle-rules">0</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-4">
                        <h3>最近操作</h3>
                        <table class="table table-striped" id="recent-history">
                            <thead>
                                <tr>
                                    <th>时间</th>
                                    <th>操作</th>
                                    <th>表</th>
                                    <th>链</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
                
                <div id="rules-page" style="display: none;">
                    <div class="mb-3">
                        <button class="btn btn-primary" onclick="showAddRuleModal()">
                            <i class="fa fa-plus"></i> 添加规则
                        </button>
                        <button class="btn btn-danger" onclick="batchDeleteRules()" id="batch-delete-btn" style="display: none;">
                            <i class="fa fa-trash"></i> 批量删除
                        </button>
                    </div>
                    
                    <div class="mb-3">
                        <select class="form-select form-select-sm" id="table-filter" onchange="filterRules()">
                            <option value="">所有表</option>
                            <option value="filter">filter</option>
                            <option value="nat">nat</option>
                            <option value="mangle">mangle</option>
                            <option value="raw">raw</option>
                        </select>
                        <select class="form-select form-select-sm" id="chain-filter" onchange="filterRules()">
                            <option value="">所有链</option>
                            <option value="INPUT">INPUT</option>
                            <option value="OUTPUT">OUTPUT</option>
                            <option value="FORWARD">FORWARD</option>
                            <option value="PREROUTING">PREROUTING</option>
                            <option value="POSTROUTING">POSTROUTING</option>
                        </select>
                        <input type="text" class="form-control form-control-sm" id="search-input" placeholder="搜索规则..." onkeyup="filterRules()">
                    </div>
                    
                    <table class="table table-striped table-sm" id="rules-table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" id="select-all"></th>
                                <th>序号</th>
                                <th>表</th>
                                <th>链</th>
                                <th>协议</th>
                                <th>源地址</th>
                                <th>目标地址</th>
                                <th>端口</th>
                                <th>动作</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                
                <div id="history-page" style="display: none;">
                    <div class="mb-3">
                        <input type="date" class="form-control form-control-sm" id="start-date">
                        <input type="date" class="form-control form-control-sm" id="end-date">
                        <select class="form-select form-select-sm" id="action-filter">
                            <option value="">所有操作</option>
                            <option value="add">添加</option>
                            <option value="update">修改</option>
                            <option value="delete">删除</option>
                            <option value="rollback">回滚</option>
                        </select>
                        <button class="btn btn-secondary" onclick="filterHistory()">筛选</button>
                        <button class="btn btn-success" onclick="exportHistory()">导出</button>
                    </div>
                    
                    <table class="table table-striped table-sm" id="history-table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>操作类型</th>
                                <th>表</th>
                                <th>链</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                
                <div id="templates-page" style="display: none;">
                    <button class="btn btn-primary mb-3" onclick="showAddTemplateModal()">
                        <i class="fa fa-plus"></i> 创建模板
                    </button>
                    
                    <table class="table table-striped table-sm" id="templates-table">
                        <thead>
                            <tr>
                                <th>名称</th>
                                <th>描述</th>
                                <th>表</th>
                                <th>链</th>
                                <th>内置</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                
                <div id="import_export-page" style="display: none;">
                    <div class="row">
                        <div class="col-md-6">
                            <h3>导出规则</h3>
                            <div class="card">
                                <div class="card-body">
                                    <select class="form-select mb-3" id="export-format">
                                        <option value="iptables">iptables-save格式</option>
                                        <option value="json">JSON格式</option>
                                        <option value="csv">CSV格式</option>
                                    </select>
                                    <select class="form-select mb-3" id="export-table">
                                        <option value="">所有表</option>
                                        <option value="filter">filter</option>
                                        <option value="nat">nat</option>
                                        <option value="mangle">mangle</option>
                                        <option value="raw">raw</option>
                                    </select>
                                    <button class="btn btn-primary" onclick="exportRules()">导出</button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="col-md-6">
                            <h3>导入规则</h3>
                            <div class="card">
                                <div class="card-body">
                                    <textarea class="form-control mb-3" id="import-content" rows="6" placeholder="粘贴iptables规则或JSON..."></textarea>
                                    <button class="btn btn-secondary" onclick="previewImport()">预览</button>
                                    <button class="btn btn-primary" onclick="importRules()">导入</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div id="system-page" style="display: none;">
                    <div class="card">
                        <div class="card-body">
                            <h3>系统信息</h3>
                            <table class="table table-striped table-sm">
                                <tbody id="system-info"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <div class="modal fade" id="addRuleModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">添加规则</h5>
                    <button type="button" class="btn-close" onclick="closeModal('addRuleModal')"></button>
                </div>
                <div class="modal-body">
                    <form id="rule-form">
                        <div class="row">
                            <div class="col-md-4">
                                <label>表</label>
                                <select class="form-control" name="table">
                                    <option value="filter">filter</option>
                                    <option value="nat">nat</option>
                                    <option value="mangle">mangle</option>
                                    <option value="raw">raw</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label>链</label>
                                <select class="form-control" name="chain">
                                    <option value="INPUT">INPUT</option>
                                    <option value="OUTPUT">OUTPUT</option>
                                    <option value="FORWARD">FORWARD</option>
                                    <option value="PREROUTING">PREROUTING</option>
                                    <option value="POSTROUTING">POSTROUTING</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label>动作</label>
                                <select class="form-control" name="target" onchange="toggleDnatFields()">
                                    <option value="ACCEPT">ACCEPT</option>
                                    <option value="DROP">DROP</option>
                                    <option value="REJECT">REJECT</option>
                                    <option value="REDIRECT">REDIRECT</option>
                                    <option value="MASQUERADE">MASQUERADE</option>
                                    <option value="DNAT">DNAT</option>
                                    <option value="SNAT">SNAT</option>
                                </select>
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-4">
                                <label>协议</label>
                                <select class="form-control" name="protocol">
                                    <option value="tcp">TCP</option>
                                    <option value="udp">UDP</option>
                                    <option value="icmp">ICMP</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label>源地址</label>
                                <input type="text" class="form-control" name="source" placeholder="如: 192.168.1.0/24">
                            </div>
                            <div class="col-md-4">
                                <label>目标地址</label>
                                <input type="text" class="form-control" name="destination" placeholder="如: 192.168.1.1">
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-4">
                                <label>源端口</label>
                                <input type="text" class="form-control" name="sport" placeholder="如: 1024:65535">
                            </div>
                            <div class="col-md-4">
                                <label>目标端口</label>
                                <input type="text" class="form-control" name="dport" placeholder="如: 80, 22">
                            </div>
                            <div class="col-md-4">
                                <label>状态</label>
                                <input type="text" class="form-control" name="state" placeholder="如: NEW,ESTABLISHED">
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-4">
                                <label>入接口</label>
                                <input type="text" class="form-control" name="in_interface" placeholder="如: eth0">
                            </div>
                            <div class="col-md-4">
                                <label>出接口</label>
                                <input type="text" class="form-control" name="out_interface" placeholder="如: eth0">
                            </div>
                            <div class="col-md-4">
                                <label>速率限制</label>
                                <input type="text" class="form-control" name="limit" placeholder="如: 10/min">
                            </div>
                        </div>
                        <div class="row mt-3" id="dnat-fields" style="display: none;">
                            <div class="col-md-4">
                                <label>DNAT/SNAT目标地址</label>
                                <input type="text" class="form-control" name="to_destination" placeholder="如: 10.104.1.116:22">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('addRuleModal')">取消</button>
                    <button type="button" class="btn btn-primary" id="rule-form-btn" onclick="submitRuleForm()">确认添加</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">确认操作</h5>
                    <button type="button" class="btn-close" onclick="closeModal('confirmModal')"></button>
                </div>
                <div class="modal-body" id="confirm-message"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('confirmModal')">取消</button>
                    <button type="button" class="btn btn-danger" id="confirm-btn">确认</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/datatables@1.11.3/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/datatables@1.11.3/js/dataTables.bootstrap5.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
